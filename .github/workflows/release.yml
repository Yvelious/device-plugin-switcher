name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate tag matches manifest version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          if [ "${GITHUB_REF_NAME}" != "${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${VERSION}"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          body: |
            Initial release of Device Extensions Switcher.

            Required Obsidian community plugin assets are attached:
            - main.js
            - manifest.json
            - styles.css

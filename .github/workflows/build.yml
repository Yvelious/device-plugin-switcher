name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare release assets
        run: npm run prepare-release

      - name: Upload release assets preview
        uses: actions/upload-artifact@v4
        with:
          name: device-plugin-switcher-assets
          path: dist/
